name: CI — Backend API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  test:
    name: Tests unitaires NestJS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API unit tests
        run: pnpm test --filter=@conduit/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: "7d"
          TIGRIS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ACCESS_KEY_ID }}
          TIGRIS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_SECRET_ACCESS_KEY }}
          TIGRIS_BUCKET_NAME: conduit-blog-uploads
          TIGRIS_ENDPOINT: https://fly.storage.tigris.dev
          MAIL_HOST: smtp.mailtrap.io
          MAIL_PORT: "2525"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: noreply@conduit.dev
